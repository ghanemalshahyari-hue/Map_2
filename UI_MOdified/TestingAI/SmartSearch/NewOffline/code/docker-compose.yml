services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dms_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    image: dms_app:latest
    container_name: dms_app
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    # If your vLLM endpoints are on the SAME host as docker, you can use
    # http://host.docker.internal:<port>/v1 in .env — the line below maps
    # the host gateway so that hostname resolves from inside the container.
    # On Linux Docker this is required (Docker Desktop on Mac/Win has it
    # built in).  Harmless if you point .env at a remote host instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./inputs:/app/inputs
      - ./prompts:/app/prompts
      - ./templates:/app/templates
      - ./data:/app/data
      - ./output:/app/output
      - ./output_docs:/app/output_docs
      # Source code mounted in so edits on host take effect inside the
      # container without rebuilding the image.  CRITICAL: do NOT mount
      # ./:/app — that would shadow /app/.cache (Docling layout +
      # bge-m3 tokenizer baked into the image) and break ingestion.
      - ./graph:/app/graph
      - ./scripts:/app/scripts
      - ./ui:/app/ui
      - ./main.py:/app/main.py
    ports:
      - "8501:8501"
    command: ["python", "main.py"]

volumes:
  qdrant_storage:
    driver: local

networks:
  default:
    name: dms_default
