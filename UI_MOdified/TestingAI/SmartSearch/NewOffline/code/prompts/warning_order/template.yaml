# prompts/warning_order/template.yaml
# ===================================
# Y-approved shape: 50 flat fields keyed exactly like
# /Users/hextechkraken/Desktop/y/WarningOrderJson.rtf.
#
# Field kinds in use:
#   source_file_extracted  — dominant kind.  The Warning Order itself is
#                            the primary source of scenario facts, with
#                            a few environment/enemy fields that may
#                            appear in the Intel Report instead.
#
# No doctrine retrieval on this document — the WARNO is a scenario-fact
# directive, not a doctrinally-grounded essay.  Fields the sources do
# not cover fall through to the "غير متوفر في المدخلات" placeholder
# via the dispatcher's sentinel handling.

