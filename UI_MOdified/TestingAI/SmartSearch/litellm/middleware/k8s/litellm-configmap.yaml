apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: default
data:
  litellm_config.yaml: |
    model_list:
      - model_name: "Qwen3-4B-Instruct-2507-FP8" 
        litellm_params:
          model: "Qwen3-4B-Instruct-2507-FP8"
          api_base: "http://156.1.1.1:8000/v1" # UPDATE THIS with your vLLM K8s service name
          api_key: "Empty"
          
    litellm_settings:
      cache: true 
      database_url: "postgresql://litellm:litellm@<postgres-service-name>:5432/litellm" # UPDATE THIS
      drop_params: true
      master_key: "sk-1234"
      routing_strategy: usage-based-routing
      
    router_settings:
#      redis_url: "redis://redis-service:6379"
#      enable_pre_call_checks: true
#      num_retries: 3
#      timeout: 60
