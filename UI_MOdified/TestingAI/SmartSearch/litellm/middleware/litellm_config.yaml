model_list:
  # LLM — Qwen3-4B-Instruct FP8 hosted by vLLM on :8000
  - model_name: llm-model
    litellm_params:
      model: hosted_vllm/Qwen/Qwen3-4B-Instruct-2507-FP8
      api_base: http://localhost:8000/v1
      api_key: Empty

  # Embedder — bge-m3 hosted by vLLM (--runner pooling) on :8001
  - model_name: embed-model
    litellm_params:
      model: hosted_vllm/BAAI/bge-m3
      api_base: http://localhost:8001/v1
      api_key: Empty

  # Reranker — bge-reranker-v2-m3 hosted by vLLM (--runner pooling --convert classify) on :8002
  # hosted_vllm/ provider knows how to translate Cohere /v1/rerank → vLLM /v1/score
  - model_name: rerank-model
    litellm_params:
      model: hosted_vllm/BAAI/bge-reranker-v2-m3
      api_base: http://localhost:8002/v1
      api_key: Empty

litellm_settings:
  cache: true
  database_url: "postgresql://litellm:litellm@localhost:5433/litellm"
  drop_params: true
  master_key: "sk-1234"
  routing_strategy: usage-based-routing

general_settings:
  use_redis_transaction_buffer: true

router_settings:
  redis_host: "localhost"
  redis_port: 6379
