# prompts/staff_brief/template.yaml
# ==================================
# Y-approved shape: 53 flat fields keyed exactly like
# /Users/hextechkraken/Desktop/y/staff_brief_edited.txt.
#
# Field kinds in use:
#   source_file_extracted  — dominant kind.  Extraction from the user's
#                            Warning Order + Intel Report (+ any additional
#                            files passed through Phase 1/2).  The per-
#                            field `source_hint` steers the extractor.
#   retrieved (doctrine)   — used only for the 4 "Conclusions / Effects"
#                            framing fields, so doctrine grounds them
#                            when the Intel Report doesn't supply an
#                            explicit conclusions paragraph.

meta:
  template_id: staff_brief
  template_version: 2
  title_arabic: "إيجاز هيئة الركن"
  document_slug: staff_brief
  output_filename: "{document_slug}.docx"
  default_collections:
    - ingest__operationalfiles__bgem3

schemas:
  StaffBrief:
    fields:
      # ---------------- environment ----------------
      Terrain:
        kind: source_file_extracted
        source_hint: intel_report
      Weather:
