        group: conclusions
        query_seeds:
          - "تأثير الأرض والطقس على العمليات"
          - "weather terrain effects on operations"
        collections:
          - ingest__operationalfiles__bgem3
        rerank_query_ar: "تأثير الأرض والطقس على العمليات التكتيكية"

      # ---------------- enemy situation ----------------
