        query_seeds:
          - "sustainment logistics estimate conclusions"
          - "G4 S4 logistics support assessment {operation.echelon}"
        collections: [ingest__operationalfiles__bgem3]
        filters:
          chunk_type: body
          source_doc:
            - "ADP-4-0-Sustainment.pdf"                   # †
            - "FM-3-0-Operations.pdf"
            - "ADP-3-0-Operations.pdf"
        prompt_ar: >
          اكتب خلاصة تقدير الإسناد اللوجستي استناداً إلى المقاطع. إن كانت
          المقاطع لا تشمل دليل الإسناد المخصص (ADP 4-0)، اذكر أن التقدير
          التفصيلي سيُصدر لاحقاً واستشهد بالإطار العام المذكور في المقاطع
          المتاحة. استشهد حرفياً بوسم كل مقطع. إن لم تدعم المقاطع الحقل،
          اكتب "غير متوفر في العقيدة المتاحة".
