<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WarGame Viewer — Gulf of Sidra 2026</title>
  <!-- Cesium core — CDN now, vendor locally per VENDORING.md for offline use -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Cesium.js"></script>
  <link  href="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link  href="style.css" rel="stylesheet">
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- Top-left HUD: operation title + current phase -->
  <div id="hud-top">
    <div id="op-title">—</div>
    <div id="phase-title">—</div>
  </div>

  <!-- Right panel: phase narrative + metrics -->
  <div id="narrative-panel">
    <div class="section-title">Scene</div>
    <div id="scene-text" class="prose">—</div>

    <div class="section-title">Red intent</div>
    <div id="red-intent" class="prose red">—</div>

    <div class="section-title">Blue intent</div>
    <div id="blue-intent" class="prose blue">—</div>

    <div class="section-title">Combined effect</div>
    <div id="combined-effect" class="prose">—</div>

    <div class="section-title">Engine metrics</div>
    <div id="metrics" class="metrics">—</div>

    <div class="section-title">Advantage</div>
    <div id="advantage" class="prose">—</div>

    <div class="section-title">Unit outcomes (top 8)</div>
    <div id="outcomes" class="outcomes">—</div>
  </div>

  <!-- Bottom phase scrubber -->
  <div id="scrubber">
    <button id="play-btn" type="button">▶</button>
    <input id="phase-slider" type="range" min="0" max="0" step="1" value="0">
    <div id="phase-label">Phase 0</div>
    <select id="speed-sel" title="Auto-play speed">
      <option value="1500">Slow</option>
      <option value="900" selected>Medium</option>
      <option value="450">Fast</option>
    </select>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-row"><span class="dot red"></span> Red</div>
    <div class="legend-row"><span class="dot blue"></span> Blue</div>
    <div class="legend-row"><span class="ring affected"></span> affected this phase</div>
    <div class="legend-row"><span class="ring actor"></span> actor this phase</div>
    <div class="legend-row"><span class="dot obj"></span> Objective</div>
    <div class="legend-row"><span class="line phase"></span> Phase line</div>
  </div>

  <!-- Bootstrap data (auto-generated by build_bootstrap.py) -->
  <script src="data/bootstrap.js"></script>
  <script src="main.js"></script>
</body>
</html>
