<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOC-UNDERSTANDING-1 — AI Understanding review (verify)</title>
    <style>
        body { background:#0b0f0d; color:#e8eaed; font-family:'Segoe UI',Tahoma,Arial,sans-serif; margin:0; padding:18px; }
        .hdr { font-size:15px; color:#7fd6a0; font-weight:600; margin-bottom:4px; }
        .sub { font-size:12px; color:#9aa3ad; margin-bottom:12px; }
        .wrap { max-width:760px; margin:0 auto; }
        #status { font-size:12px; color:#c5ddf0; margin-bottom:8px; }
        button#reload { font:inherit;cursor:pointer;border:1px solid #4a7bb8;background:#22303f;color:#cfe6ff;border-radius:6px;padding:6px 12px;margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="hdr">AI Understanding — Verify Harness</div>
        <div class="sub">DOC-UNDERSTANDING-1 / Phase E — renders the live <code>POST /api/wargame-sim/analyze</code> payload
            using the same <code>shell/doc-understanding-review.js</code> the import wizard uses. No auth required (read-only JS gate).</div>
        <button id="reload" type="button">Re-run analyze</button>
        <div id="status">Loading…</div>
        <div id="review" style="border:1px solid #2e5d7d;border-radius:8px;background:#0e1620;padding:12px;"></div>
    </div>

    <script src="shell/doc-understanding-review.js?v=1"></script>
    <script>
        (function () {
            var statusEl = document.getElementById('status');
            var reviewEl = document.getElementById('review');
            function run() {
                statusEl.textContent = 'Analyzing staged documents…';
                fetch('/api/wargame-sim/analyze', { method: 'POST', credentials: 'same-origin' })
                    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
                    .then(function (res) {
                        if (!res.body || !res.body.ok) {
                            statusEl.textContent = 'analyze failed (' + res.status + '): ' + ((res.body && res.body.error) || 'unknown');
                            return;
                        }
                        statusEl.textContent = 'document_set_id = ' + res.body.document_set_id + ' · set_type = ' + res.body.set_type;
                        window.RmoozDocReview.render(reviewEl, res.body, {
                            onGenerate: function () { alert('Generate clicked (verify harness — no generation here).'); },
                            onUploadMore: function () { alert('Upload More clicked (verify harness).'); },
                            onCancel: function () { reviewEl.style.display = 'none'; }
                        });
                    })
                    .catch(function (e) { statusEl.textContent = 'error: ' + e.message; });
            }
            document.getElementById('reload').addEventListener('click', run);
            run();
        })();
    </script>
</body>
</html>
