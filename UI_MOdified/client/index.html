<!DOCTYPE html>
<html lang="ar" dir="rtl" class="landing-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>rmooz — رموز</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Shared landing backdrop: side gradients + carbon weave (fills img letterboxing from object-fit: contain) */
        html.landing-html,
        body.landing-html,
        .landing-hit,
        .landing-logo {
            background-color: #121212;
            background-image:
                linear-gradient(
                    90deg,
                    #2a2a2a 0%,
                    #1a1a1a 14%,
                    rgba(24, 24, 24, 0) 32%,
                    rgba(24, 24, 24, 0) 68%,
                    #1a1a1a 86%,
                    #2a2a2a 100%
                ),
                radial-gradient(
                    ellipse 85% 120% at 50% 48%,
                    rgba(55, 55, 55, 0.22) 0%,
                    transparent 58%
                ),
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.028) 0px,
                    rgba(255, 255, 255, 0.028) 1px,
                    transparent 1px,
                    transparent 6px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(0, 0, 0, 0.35) 0px,
                    rgba(0, 0, 0, 0.35) 1px,
                    transparent 1px,
                    transparent 6px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.018) 0px,
                    rgba(255, 255, 255, 0.018) 1px,
                    transparent 1px,
                    transparent 5px
                ),
                linear-gradient(180deg, #161616 0%, #0e0e0e 50%, #141414 100%);
            background-repeat: no-repeat, no-repeat, repeat, repeat, repeat, no-repeat;
            background-size: 100% 100%, 100% 100%, auto, auto, auto, 100% 100%;
            background-position: center;
        }

        html.landing-html,
        body.landing-html {
            margin: 0;
            overflow: hidden;
            height: 100%;
        }

        .landing-hit {
            position: fixed;
            inset: 0;
            display: block;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .landing-hit:focus {
            outline: none;
        }

        .landing-hit:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: -3px;
        }

        .landing-logo {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>

<body class="landing-html">
    <a href="app.html" class="landing-hit" aria-label="Continue to workspace">
        <img src="../assets/brand-logo.jpeg" alt="" class="landing-logo" decoding="async">
    </a>
</body>

</html>
